codeletset_id: mac_bsr_custom

codelet_descriptor:

  - codelet_name: mac_stats_collect_bsr_custom
    codelet_path: ${JBPF_CODELETS}/mac/mac_stats_collect_bsr_custom.o
    hook_name: report_stats
    priority: 1
    out_io_channel:
      - name: output_map_bsr_custom
        forward_destination: DestinationUDP
        serde:
          file_path: ${JBPF_CODELETS}/mac/mac_sched_bsr_stats_custom:bsr_stats_custom_serializer.so
          protobuf:
            package_path: ${JBPF_CODELETS}/mac/mac_sched_bsr_stats_custom.pb
            msg_name: bsr_stats_custom

  - codelet_name: mac_sched_bsr_stats_custom
    codelet_path: ${JBPF_CODELETS}/mac/mac_sched_bsr_stats_custom.o
    hook_name: mac_sched_ul_bsr_indication
    priority: 1
    linked_maps:
      - map_name: stats_map_bsr_custom
        linked_codelet_name: mac_stats_collect_bsr_custom
        linked_map_name: stats_map_bsr_custom
      - map_name: bsr_custom_hash
        linked_codelet_name: mac_stats_collect_bsr_custom
        linked_map_name: bsr_custom_hash
      - map_name: bsr_custom_not_empty
        linked_codelet_name: mac_stats_collect_bsr_custom
        linked_map_name: bsr_custom_not_empty
